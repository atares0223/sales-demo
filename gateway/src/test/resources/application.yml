spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: customer
          uri: lb://customer
          predicates:
            - Path=/customer/**
          filters:
            - StripPrefix=1
            - RewritePath=/customer/(?<segment>.*), /${segment}
            - AddResponseHeader=X-Response-Time, 123
    nacos:
      discovery:
        group: sales
        namespace: dev
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        group: sales
        file-extension: yaml
        namespace: dev
        username: nacos
        password: nacos
server:
  port: 8000